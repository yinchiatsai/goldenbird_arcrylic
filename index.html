<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>金雀 | 職人報價系統 v13.6.1</title>
    <style>
        :root {
            --primary: #26515e;
            --gold: #f39c12;
            --bg: #f4f7f6;
            --white: #ffffff;
            --warn: #e67e22;
            --success: #27ae60;
            --danger: #d9534f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 25px;
            box-sizing: border-box;
        }

        header {
            border-bottom: 2px solid var(--primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            text-align: center;
        }

        header h1 {
            color: var(--primary);
            font-size: 20px;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }

        .row>div {
            flex: 1;
            min-width: 140px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        select,
        input {
            width: 100%;
            height: 45px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fafafa;
            outline: none;
        }

        select:focus,
        input:focus {
            border-color: var(--primary);
        }

        .option-group {
            background: #fdfaf0;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 1px solid #e2d1a3;
            position: relative;
        }

        .result-box {
            background: var(--primary);
            color: var(--white);
            padding: 25px 20px;
            border-radius: 18px;
            text-align: center;
        }

        .result-box.error {
            background: var(--danger);
        }

        .price {
            font-size: 52px;
            font-weight: 800;
            color: var(--gold);
            margin: 5px 0;
            line-height: 1;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .std-badge {
            background: var(--success);
            color: white;
        }

        .script-area {
            background: #f4f7f6;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
            line-height: 1.6;
            border-radius: 8px;
            color: #333;
        }

        .logic-tag {
            display: block;
            font-size: 12px;
            color: #666;
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 6px;
            margin-top: 6px;
        }

        .warn-text {
            color: var(--danger);
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
            display: none;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>JINQUE 金雀報價 v13.6.1</h1>
        </header>

        <div class="row">
            <div>
                <label>工藝規格</label>
                <select id="type" onchange="checkConflict()">
                    <option value="full">滿版背印</option>
                    <option value="transparent">透明背印</option>
                </select>
            </div>
            <div>
                <label>切割造型</label>
                <select id="shapeType" onchange="calc()">
                    <option value="none">標準矩形</option>
                    <option value="custom">特殊造型</option>
                </select>
            </div>
        </div>

        <div class="row">
            <div><label>邊長 A (cm)</label><input type="number" id="w" value="15" step="0.1" oninput="calc()"></div>
            <div><label>邊長 B (cm)</label><input type="number" id="h" value="9.5" step="0.1" oninput="calc()"></div>
        </div>

        <div class="option-group">
            <label style="color: #8a6d3b; font-weight: 800; margin-bottom: 10px;">🛠️ 加工選配</label>
            <div class="row">
                <div>
                    <label>印製面</label>
                    <select id="sides" onchange="checkConflict()">
                        <option value="single">單面印製</option>
                        <option value="double">雙面印製</option>
                    </select>
                </div>
                <div id="doubleRow" class="hidden">
                    <label>雙面內容</label>
                    <select id="doubleType" onchange="calc()">
                        <option value="same">相同內容 (+30%)</option>
                        <option value="different">不同內容 (+50%)</option>
                    </select>
                </div>
            </div>
            <div class="row" style="margin-bottom: 0;">
                <div>
                    <label>背膠服務</label>
                    <select id="adhesive" onchange="calc()">
                        <option value="none">不需背膠</option>
                        <option value="yes">需要強力背膠</option>
                    </select>
                    <div id="adhesiveWarn" class="warn-text">⚠️ 透明背印不可加背膠，以免影響視覺。</div>
                </div>
            </div>
        </div>

        <div class="result-box" id="resBox">
            <div id="modeBadge" class="badge std-badge">職人精密報價系統</div>
            <div class="price" id="totalPrice">$0</div>
        </div>

        <div class="script-area" id="scriptContent"></div>
    </div>

    <script>
        function checkConflict() {
            const type = document.getElementById('type').value;
            const sides = document.getElementById('sides').value;
            const doubleRow = document.getElementById('doubleRow');
            const adhesiveEl = document.getElementById('adhesive');
            const adhesiveWarn = document.getElementById('adhesiveWarn');

            // 雙面 vs 背膠 衝突
            if (sides === 'double') {
                doubleRow.classList.remove('hidden');
                adhesiveEl.value = 'none';
                adhesiveEl.disabled = true;
                adhesiveEl.style.opacity = '0.5';
            } else {
                doubleRow.classList.add('hidden');
                // 透明背印 vs 背膠 衝突
                if (type === 'transparent') {
                    adhesiveEl.value = 'none';
                    adhesiveEl.disabled = true;
                    adhesiveEl.style.opacity = '0.5';
                    adhesiveWarn.style.display = 'block';
                } else {
                    adhesiveEl.disabled = false;
                    adhesiveEl.style.opacity = '1';
                    adhesiveWarn.style.display = 'none';
                }
            }
            calc();
        }

        function calc() {
            const type = document.getElementById('type').value;
            const isShape = document.getElementById('shapeType').value === 'custom';
            const hasAdhesive = document.getElementById('adhesive').value === 'yes' && !document.getElementById('adhesive').disabled;
            const isDouble = document.getElementById('sides').value === 'double';
            const doubleType = document.getElementById('doubleType').value;

            let in1 = parseFloat(document.getElementById('w').value) || 0;
            let in2 = parseFloat(document.getElementById('h').value) || 0;
            let w = Math.max(in1, in2);
            let h = Math.min(in1, in2);
            const area = w * h;

            if (w > 41.1 || h > 31.1) {
                document.getElementById('resBox').classList.add('error');
                document.getElementById('totalPrice').innerText = "超出範圍";
                return;
            }
            document.getElementById('resBox').classList.remove('error');

            let basePrice = 0;
            let tierName = "";

            if (area <= 14.1) { basePrice = 130; tierName = "XS 標準級"; }
            else if (area <= 22) { basePrice = 180; tierName = "XS 微型過渡 (一)"; }
            else if (area <= 35) { basePrice = 260; tierName = "XS 微型過渡 (二)"; }
            else if (area <= 60) { basePrice = 350; tierName = "S- 小型配件級"; }
            else if (area <= 100) { basePrice = 480; tierName = "S 級 中型件"; }
            else if (area <= 142.5) { basePrice = 650; tierName = "S 級 標準規格"; }
            else if (area <= 300) { basePrice = 750; tierName = "M 級 標準規格"; }
            else if (area <= 600) { basePrice = 900; tierName = "L 級 標準規格"; }
            else {
                let rawBigPrice = 900 + (area - 600) * 1.85;
                basePrice = Math.ceil(rawBigPrice / 50) * 50;
                tierName = "特大件風險跳階";
            }

            if (type === 'transparent') basePrice = Math.round((basePrice * 0.85) / 10) * 10;

            let shapeFee = 0;
            if (isShape) {
                shapeFee = (area <= 22 ? 30 : (area <= 100 ? 60 : 120));
                basePrice += shapeFee;
            }

            let final = basePrice;
            let sideText = "單面";
            if (isDouble) {
                let rate = (doubleType === 'same') ? 1.3 : 1.5;
                final = Math.round((basePrice * rate) / 10) * 10;
                sideText = (doubleType === 'same') ? "雙面(同圖)" : "雙面(不同圖)";
            }

            let adhesiveFee = 0;
            if (hasAdhesive) {
                if (area <= 100) adhesiveFee = 50;
                else if (area <= 300) adhesiveFee = 80;
                else adhesiveFee = 100;
                final += adhesiveFee;
            }

            document.getElementById('totalPrice').innerText = `$${final}`;
            document.getElementById('scriptContent').innerHTML = `
            <b>💬 客服建議回覆：</b><br>
            您好！報價 ${w}x${h}cm ${sideText} / ${type === 'full' ? '滿版' : '透明'} / 總金額 <b>$${final}</b> 元。<br>
            <div style="border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 10px;">
                <b>🛠️ 報價分析：</b><br>
                <span class="logic-tag">● 判定：${tierName}</span>
                <span class="logic-tag">● 工序：${sideText} 排版計價</span>
                ${isShape ? `<span class="logic-tag">● 包含特殊造型費：$${shapeFee}</span>` : ''}
                ${hasAdhesive ? `<span class="logic-tag">● 包含強力背膠費：$${adhesiveFee}</span>` : ''}
                ${type === 'transparent' ? `<span class="logic-tag" style="color:red">● 提醒：透明工藝不建議加背膠</span>` : ''}
            </div>
        `;
        }
        checkConflict();
    </script>
</body>

</html>
